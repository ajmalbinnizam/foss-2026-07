<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="5" />
  <title>Chronos &mdash; Curated Timepieces</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header class="topbar">
    <h1>CHRONOS</h1>
    <p class="tagline">Curated timepieces, dropped weekly</p>
  </header>

  <main class="grid">
    {% for watch in watches %}
    <article class="card {% if loop.first %}card--new{% endif %}">
      {% if loop.first %}<span class="badge badge--new">New Arrival</span>{% endif %}
      <span class="badge badge--stock">In Stock</span>
      <img src="{{ watch.image }}" alt="{{ watch.title }}" />
      <h2>{{ watch.title }}</h2>
      <p class="description">{{ watch.description }}</p>
      <p class="price">${{ "%.2f"|format(watch.price) }}</p>
    </article>
    {% endfor %}
  </main>
</body>
</html>
